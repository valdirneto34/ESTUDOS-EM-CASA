<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Contador</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Vamos contar!</h1>
    </header>
    <section>
        <div>
            <p>
                Início:
                <input type="number" name="txtinicio" id="txtinicio">
            </p>
            <p>
                Fim:
                <input type="number" name="txtfim" id="txtfim">
            </p>
            <p>
                Passo:
                <input type="number" name="txtpasso" id="txtpasso">
            </p>
            <p id="contar">
                <input type="button" value="Contar" id="botaocontar" onclick="contar()">
            </p>
        </div>
        <div id="res">
            Preparando a contagem...
        </div>
    </section>
    <footer>
        <p>&copy; Valdir Neto</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
