<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisador de Números</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div>
            <p>
                Número (entre 1 e 100):
                <input type="number" id="num" min="1" max="100">
                <input type="button" class="btn" value="Adicionar" onclick="adicionar()">
            <p>
                <select id="lista" size="10"></select>
            </p>
            <p>
                <input type="button" value="Finalizar" class="btn" onclick="finalizar()">
            </p>
            </p>
        </div>
        <div id="res">
        </div>
    </section>
    <footer>
        <p>&copy; Valdir Neto</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
