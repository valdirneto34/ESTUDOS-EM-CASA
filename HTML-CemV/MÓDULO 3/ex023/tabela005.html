<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício de Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bold;
            padding: 10px;
        }

        th,
        td {
            border: 1px solid black;
            padding: 10px;
        }

        .cnome {
            background-color: chartreuse;
        }

        .cgrupo {
            background-color: lightcoral;
        }
    </style>
</head>

<body>
    <h1>Exercício de Tabelas</h1>
    <table>
        <colgroup>
            <col class="cnome">
            <col class="cgrupo" span="2">
            <col class="cprof">
        </colgroup>
        <caption>Cadastro</caption>
        <tr>
            <th scope="col">Nome</th>
            <th scope="col">Sexo</th>
            <th scope="col">Idade</th>
            <th scope="col">Profissão</th>
        </tr>
        <tr>
            <td>Ana Maria</td>
            <td>F</td>
            <td>25</td>
            <td>Jornalista</td>
        </tr>
        <tr>
            <td>Valdir Neto</td>
            <td>M</td>
            <td>21</td>
            <td>Desenvolvedor Front-End</td>
        </tr>
        <tr>
            <td>Patrícia Silva</td>
            <td>F</td>
            <td>20</td>
            <td>Desenvolvedora Mobile</td>
        </tr>
        <tr>
            <td>Sebastião</td>
            <td>M</td>
            <td>64</td>
            <td>Soldador</td>
        </tr>
        <tr>
            <td>Juliana</td>
            <td>F</td>
            <td>43</td>
            <td>Cabeleireira</td>
        </tr>
        <tr>
            <td>Otávio</td>
            <td>M</td>
            <td>36</td>
            <td>Nutricionista</td>
        </tr>
    </table>
</body>

</html>
